<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}">
<head>
  <meta name="_csrf" th:content="${_csrf.token}" />
  <meta name="_csrf_header" th:content="${_csrf.headerName}" />
  <title>Schedule Management - All Schedules</title>
</head>
<body>
  <th:block th:fragment="main">

    <section class="container py-4">
      <h2>All Schedules</h2>

      <table id="schedulesTable" class="table table-striped table-bordered">
        <thead class="table-primary">
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Start Date & Time</th>
            <th>End Date & Time</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="6" class="text-center">Loading...</td></tr>
        </tbody>
      </table>

      <!-- Update Schedule Modal -->
      <div class="modal fade" id="updateScheduleModal" tabindex="-1" aria-labelledby="updateScheduleModalLabel"
           aria-hidden="true">
        <div class="modal-dialog">
          <form id="updateScheduleForm" class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title" id="updateScheduleModalLabel">Update Schedule Dates</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="scheduleId" />
              <div class="mb-3">
                <label for="startDateInput" class="form-label">Start Date & Time</label>
                <input type="datetime-local" class="form-control" id="startDateInput" required />
              </div>
              <div class="mb-3">
                <label for="endDateInput" class="form-label">End Date & Time</label>
                <input type="datetime-local" class="form-control" id="endDateInput" required />
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save changes</button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <link th:href="@{/css/schedule/schedules-list.css}" rel="stylesheet" />
    <script th:src="@{/js/axios.min.js}" defer></script>
    <script th:src="@{/js/schedule/schedules-list.js}" defer></script>
  </th:block>
</body>
</html>

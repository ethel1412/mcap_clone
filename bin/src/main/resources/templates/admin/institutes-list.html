<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}"> 

<head>
    <title>Manage Institutes</title>
</head>

<body>
<main>
    <div class="container-fluid px-4 py-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 mb-0">Manage Institute Submissions</h1>
        </div>
        
        <!-- FILTER FEEDBACK ALERT -->
        <div th:if="${filterStatus}" class="alert alert-info d-flex align-items-center" role="alert">
            <i class="fas fa-filter me-2" aria-hidden="true"></i>
            <div>
                Showing institutes with status: <strong class="text-capitalize" th:text="${filterStatus == 'PENDING'} ? 'Pending' : ${filterStatus}"></strong>.
                <a th:href="@{/admin/institutes-list}" class="alert-link ms-2">Clear Filter</a>
            </div>
        </div>

        <!-- Success/Error Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-header bg-light border-bottom-0">
                <h2 class="h5 card-title mb-0">
                    <i class="fas fa-university me-2 text-primary" aria-hidden="true"></i>All Institutes
                </h2>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle w-100" id="institutesTable">
                        <caption class="visually-hidden">A searchable and sortable table of all institute submissions.</caption>
                        
                        <thead>
                            <tr th:replace="~{common/fragments :: instituteTableHeaderRow}"></tr>
                        </thead>
                        
                        <tbody>
                            <th:block th:replace="~{common/fragments :: instituteTableBodyRows(instituteList=${institutes})}"></th:block>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

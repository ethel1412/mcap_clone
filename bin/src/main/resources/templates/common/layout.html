<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>

    <title th:replace="${title}">Admin Panel</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/dataTables.bootstrap5.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="d-flex flex-column" id="sidebar-wrapper">
            
            <div class="list-group list-group-flush">
                
                <!-- 1.  Profile Section (structured like a menu item) -->
                <div class="list-group-item sidebar-profile border-bottom">
                    <i class="fas fa-user-shield fa-fw me-3"></i>
                    <div class="sidebar-text">
                        <span class="d-block fw-bold" sec:authentication="principal.username">Admin</span>
<!--                        <small class="d-block" sec:authentication="principal.role.roleName">Role</small>-->
                    </div>
                </div>
    
                <!-- 2. Menu items will be dynamically loaded here -->
                <div id="sidebar-menu-container">
                    <div class="text-center p-4">
                        <div class="spinner-border" role="status" style="color: #64748b;">
                            <span class="visually-hidden">Loading Menu...</span>
                        </div>
                    </div>
                </div>
    
            </div>
    
        </div>
    <!-- Page Content Wrapper -->
    <div id="page-content-wrapper" class="flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
            <div class="container-fluid">
                <button class="btn btn-light" id="menu-toggle" aria-label="Toggle sidebar menu">
                    <i class="fas fa-bars" aria-hidden="true"></i>
                </button>
                <div class="flex-grow-1"></div>
                <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                    <!-- Profile Modal Trigger -->
                    <li class="nav-item">
                        <a href="javascript:void(0);" id="showProfileModal" class="nav-link d-flex align-items-center">
                            <i class="fas fa-user-circle me-1"></i>
                            <span sec:authentication="principal.username">User</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
        <main class="p-3" th:replace="${content} ?: ~{}"></main>
    </div>
</div>
               <!-- Profile Modal -->
    <div class="modal fade" id="profileModal" tabindex="-1" aria-labelledby="profileModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="d-flex align-items-center">
                        <i class="fas fa-user-circle fa-2x me-2"></i>
                        <h5 class="modal-title" id="profileModalLabel">My Profile</h5>
                    </div>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <i class="fas fa-user-circle fa-4x mb-3"></i>
                    <h6 sec:authentication="principal.username"></h6>
                    <p class="mb-0" sec:authentication="principal.role.roleName"></p>
                </div>
                <div class="modal-footer d-flex flex-column gap-2">
                    <a class="btn btn-primary w-100" th:href="@{/user-management/user-profile}">My Account</a>
                    <form th:action="@{/logout}" method="post" class="w-100">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-danger w-100">
                            <i class="fas fa-sign-out-alt me-2"></i> Logout
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>


<!-- Reusable Elements -->
<div th:replace="~{common/common-elements :: toast}"></div>
<div th:replace="~{common/common-elements :: previewModal}"></div>
<div th:replace="~{common/common-elements :: rejectionModal}"></div>
<div th:replace="~{common/common-elements :: confirmationModal}"></div>

<!-- Global JS Libraries -->
<script src="/js/jquery.min.js"></script>
<script src="/js/bootstrap.bundle.min.js"></script>
<script src="/js/axios.min.js"></script>
<script src="/js/jquery.dataTables.min.js"></script>
<script src="/js/dataTables.bootstrap5.min.js"></script>

<!-- Page Specific JS -->
<script th:src="@{/js/utils.js}"></script>
<script th:src="@{/js/sidebar.js}"></script>
<script th:src="@{/js/institute-management.js}"></script>
<script th:src="@{/js/admission-management.js}"></script>

<script th:src="@{/js/controller-dashboard.js}"></script>




</body>
</html>

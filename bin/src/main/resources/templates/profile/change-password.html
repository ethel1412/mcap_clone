<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title},~{::main})}">

<th:block th:fragment="title">Change Password</th:block>

<th:block th:fragment="main">
<section class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-danger text-white">
          <h5 class="mb-0"><i class="fas fa-key me-2"></i> Change Password</h5>
        </div>
        <div class="card-body p-4">
          <div id="alert-box"></div>

          <form id="changePasswordForm">
            <div class="mb-3">
              <label class="form-label fw-semibold">Current Password</label>
              <input type="password" name="oldPassword" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <input type="password" name="newPassword" class="form-control" required minlength="6" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm New Password</label>
              <input type="password" name="confirmPassword" class="form-control" required minlength="6" />
            </div>
            <div class="d-flex justify-content-end mt-4">
              <a th:href="@{/user-management/user-profile}" class="btn btn-secondary me-2">Cancel</a>
              <button type="submit" class="btn btn-danger px-4">Update Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/jsencrypt/bin/jsencrypt.min.js" defer></script>

<script th:src="@{/js/profile/change-password.js}" defer></script>
</th:block>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title},~{::main})}">

<head>
  <title>Update Profile</title>
</head>
<body>
<th:block th:fragment="main">
<section class="container-fluid py-4">
  <div id="updateProfileWrapper" th:data-usercode="${userCode}">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-warning text-dark">
            <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i> Update Profile</h5>
          </div>
          <div class="card-body p-4">
            <div id="alert-box"></div>

            <form id="updateProfileForm">
              <!-- Hidden field -->
              <input type="hidden" id="userCode" name="userCode">

              <div class="mb-3">
                <label class="form-label fw-semibold">Enabled</label><br>
                <input type="checkbox" id="enabled" name="enabled">
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Account Non-Expired</label><br>
                <input type="checkbox" id="accountNonExpired" name="accountNonExpired">
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Account Non-Locked</label><br>
                <input type="checkbox" id="accountNonLocked" name="accountNonLocked">
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Credentials Non-Expired</label><br>
                <input type="checkbox" id="credentialsNonExpired" name="credentialsNonExpired">
              </div>

              <div class="d-flex justify-content-end gap-2 mt-4">
                <a th:href="@{/user-management/user-profile}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
              </div>
            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script th:src="@{/js/profile/update-profile.js}" defer></script>
</th:block>
</body>
</html>

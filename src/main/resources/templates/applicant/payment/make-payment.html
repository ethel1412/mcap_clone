<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf"        th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Processing Payment...</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/applicant/payment.css}">

    <!-- Razorpay Standard Checkout SDK (replaces Cashfree SDK) -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script defer th:src="@{/js/applicant/payment-bridge.js}"></script>
</head>
<body class="bg-light d-flex align-items-center justify-content-center payment-full-height">

<div class="text-center">
    <div class="spinner-border text-primary mb-3" role="status"></div>
    <h3 class="fw-bold">Connecting to Secure Payment Gateway...</h3>
    <p class="text-muted mb-4">Order ID: <span th:text="${receiptId}" class="fw-bold text-dark"></span></p>

    <!--
        Hidden form — the Razorpay handler callback will populate these fields
        and submit this form to /payment-callback for server-side signature verification.
    -->
    <form id="rzpCallbackForm"
          th:action="@{/applicants/payment/payment-callback}"
          method="POST"
          style="display:none;">
        <!-- CSRF -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <!-- Razorpay-returned fields (populated by JS after successful payment) -->
        <input type="hidden" id="rzp_payment_id" name="razorpay_payment_id"/>
        <input type="hidden" id="rzp_order_id"   name="razorpay_order_id"/>
        <input type="hidden" id="rzp_signature"   name="razorpay_signature"/>
        <!-- Our internal receipt / order ID (passed through as-is) -->
        <input type="hidden" name="receipt_id"    th:value="${receiptId}"/>
    </form>

    <!--
        payBtn is the visible fallback if the modal doesn't auto-open.
        data-* attributes carry all the values the JS needs.
    -->
    <button id="payBtn"
            class="btn btn-outline-primary d-none"
            th:data-razorpay-order-id="${razorpayOrderId}"
            th:data-key-id="${razorpayKeyId}"
            th:data-receipt-id="${receiptId}">
        Click here if the payment window does not open automatically
    </button>
</div>

</body>
</html>

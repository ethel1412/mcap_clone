<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/all.min.css}">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        <i class="fa-solid fa-key me-2"></i>
                        Reset Password
                    </h2>

		    <p class="text-danger">[Password should contain atleast one Capital letter, one number, one special character and should be minimum 8 characters in length]</p>

                    <!-- ERROR MESSAGE -->
                    <div th:if="${errorMessage}"
                         class="alert alert-danger">

                        <i class="fa-solid fa-circle-exclamation me-2"></i>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <!-- SUCCESS MESSAGE -->
                    <div th:if="${successMessage}"
                         class="alert alert-success">

                        <i class="fa-solid fa-circle-check me-2"></i>
                        <span th:text="${successMessage}"></span>
                    </div>

                    <!-- INFO -->
                    <div class="alert alert-info">
                        <i class="fa-solid fa-circle-info me-2"></i>
                        Enter your registered details to reset password.
                    </div>

                    <form th:action="@{/reset-password}"
                          method="post"
                          th:object="${resetPasswordDTO}">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />

                        <!-- FIRST NAME -->
                        <div class="mb-3">

                            <label for="firstName"
                                   class="form-label">
                                First Name *
                            </label>

                            <input type="text"
                                   id="firstName"
                                   class="form-control"
                                   th:field="*{firstName}"
                                   placeholder="Enter First Name"
                                   required>

                        </div>

                        <!-- DATE OF BIRTH -->
                        <div class="mb-3">

                            <label for="dateOfBirth"
                                   class="form-label">
                                Date of Birth *
                            </label>

                            <input type="date"
                                   id="dateOfBirth"
                                   class="form-control"
                                   th:field="*{dateOfBirth}"
                                   required>

                        </div>

                        <!-- PHONE NUMBER -->
                        <div class="mb-3">

                            <label for="phoneNumber"
                                   class="form-label">
                                Phone Number *
                            </label>

                            <input type="text"
                                   id="phoneNumber"
                                   class="form-control"
                                   th:field="*{phoneNumber}"
                                   maxlength="10"
                                   placeholder="Enter Phone Number"
                                   required>

                        </div>

                        <!-- EMAIL -->
                        <div class="mb-3">

                            <label for="email"
                                   class="form-label">
                                Email (Optional)
                            </label>

                            <input type="email"
                                   id="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="Enter Email">

                        </div>

                        <!-- NEW PASSWORD -->
                        <div class="mb-3">

                            <label for="newPassword"
                                   class="form-label">
                                New Password *
                            </label>

                            <div class="input-group">

                                <input type="password"
                                       id="newPassword"
                                       class="form-control"
                                       th:field="*{newPassword}"
                                       placeholder="Enter New Password"
                                       autocomplete="off"
                                       required>

                                <button class="btn btn-outline-secondary toggle-password"
                                        type="button"
                                        data-target="newPassword">

                                    <i class="fa-solid fa-eye"></i>

                                </button>

                            </div>

                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div class="mb-4">

                            <label for="confirmPassword"
                                   class="form-label">
                                Confirm Password *
                            </label>

                            <div class="input-group">

                                <input type="password"
                                       id="confirmPassword"
                                       class="form-control"
                                       th:field="*{confirmPassword}"
                                       placeholder="Confirm Password"
                                       autocomplete="off"
                                       required>

                                <button class="btn btn-outline-secondary toggle-password"
                                        type="button"
                                        data-target="confirmPassword">

                                    <i class="fa-solid fa-eye"></i>

                                </button>

                            </div>

                        </div>

                        <!-- SUBMIT -->
                        <div class="d-grid">

                            <button type="submit"
                                    class="btn btn-primary btn-lg">

                                <i class="fa-solid fa-floppy-disk me-2"></i>
                                Reset Password
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/reset-password.js}"></script>

</body>
</html>

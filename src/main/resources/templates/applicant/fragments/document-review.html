<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="document-review">

    <div class="alert alert-info border-info border-2" role="alert">
        <h5 class="alert-heading fw-bold"><i class="bi bi-eye-fill me-2"></i>Document Review Mode</h5>
        <p class="mb-0">This view is read-only. Click any document preview box (or its file icon) to open the full file in a new tab for verification.</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-header bg-light py-3">
            <h5 class="mb-0">Required Documents</h5>
        </div>
        <div class="list-group list-group-flush" id="document-review-container">
            <div th:each="docEntry : ${requiredDocTypes}" class="list-group-item p-3 document-row" th:with="docType=${docEntry.key}, docLabel=${docEntry.value}, uploadedDoc=${uploadedDocsMap.get(docType)}">
                <div class="row g-3 align-items-center">
                    <div class="col-lg-5">
                        <h6 class="mb-1 fw-bold text-dark" th:text="${docLabel}"></h6>
                        <div class="form-text small text-muted">
                            <span th:text="${uploadedDoc} ? ('File: ' + ${uploadedDoc.fileName}) : 'Status: Not Uploaded'"></span>
                        </div>
                    </div>

                    <div class="col-lg-3">
                        <div class="preview-box border rounded text-center review-preview-box" th:attr="data-document-id=${uploadedDoc?.id}" th:classappend="${uploadedDoc} ? 'clickable-preview'">
                            <div class="preview-content h-100 w-100">
                                <th:block th:if="${uploadedDoc}">
                                    <img th:if="${#strings.startsWith(uploadedDoc.fileType, 'image/')}"
                                         th:src="@{/applicants/documents/{id}(id=${uploadedDoc.id})}"
                                         alt="Preview" class="img-fluid preview-image review-preview-img">
                                    <div th:unless="${#strings.startsWith(uploadedDoc.fileType, 'image/')}" class="d-flex flex-column justify-content-center align-items-center h-100 text-muted p-2">
                                        <i class="bi bi-file-earmark-pdf-fill fs-3 text-danger"></i>
                                        <span class="small" th:text="${#strings.abbreviate(uploadedDoc.fileName, 15)}"></span>
                                        <span class="badge bg-primary mt-1">Click to View</span>
                                    </div>
                                </th:block>
                                <span th:unless="${uploadedDoc}" class="preview-placeholder text-muted small d-flex align-items-center justify-content-center h-100 w-100">
                                    <i class="bi bi-x-circle me-2 text-danger"></i>Missing
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-4 d-flex align-items-center justify-content-lg-end">
                        <span th:if="${uploadedDoc}" class="badge bg-success fs-6">
                            <i class="bi bi-check-circle me-1"></i>Uploaded
                        </span>
                        <span th:unless="${uploadedDoc}" class="badge bg-danger fs-6">
                            <i class="bi bi-x-octagon me-1"></i>Missing
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>

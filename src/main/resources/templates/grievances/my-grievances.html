<div class="container-fluid p-0 fade-in" xmlns:th="http://www.w3.org/1999/xhtml">
    <div class="row mb-4">
        <div class="col-12">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <i class="bi bi-list-check fs-4 text-primary me-2"></i>
                        <h5 class="mb-0 fw-bold">My Grievances</h5>
                    </div>
                    <span class="badge bg-secondary rounded-pill" th:text="${grievances != null ? grievances.size() : 0} + ' Tickets'">0 Tickets</span>
                </div>

                <div class="card-body p-0">
                    <!-- Empty State -->
                    <div th:if="${grievances == null or grievances.isEmpty()}" class="p-5 text-center text-muted bg-light">
                        <i class="bi bi-inbox fs-1 d-block mb-3 text-secondary"></i>
                        <h5 class="fw-semibold">No Grievances Found</h5>
                        <p class="mb-0">You have not submitted any grievances yet.</p>
                        <button type="button" class="btn btn-outline-primary mt-3" data-bs-toggle="modal" data-bs-target="#grievanceModal">
                            <i class="bi bi-plus-circle me-1"></i> Submit a New Grievance
                        </button>
                    </div>

                    <!-- Grievances List -->
                    <div class="list-group list-group-flush" th:if="${grievances != null and !grievances.isEmpty()}">
                        <div class="list-group-item p-4" th:each="g : ${grievances}">

                            <!-- Header Row: Ticket Code, Status, Date -->
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <span class="badge bg-primary me-2 px-2 py-1 font-monospace fs-6 shadow-sm" th:text="${g.ticketCode}">GRV-XXXX</span>
                                    <span class="badge rounded-pill px-2 py-1 shadow-sm"
                                          th:classappend="${g.status == 'OPEN' ? 'bg-warning text-dark' : 'bg-success'}"
                                          th:text="${g.status}">OPEN</span>
                                </div>
                                <div class="text-end">
                                    <small class="text-muted d-block fw-semibold" th:text="${#temporals.format(g.submittedAt, 'dd MMM yyyy')}"></small>
                                    <small class="text-muted" th:text="${#temporals.format(g.submittedAt, 'hh:mm a')}"></small>
                                </div>
                            </div>

                            <!-- Category & Target Info -->
                            <div class="mb-3">
                                <h6 class="fw-bold mb-1 text-dark">
                                    <i class="bi bi-tag-fill text-secondary me-1"></i>
                                    <span th:text="${g.category.name}">Category Name</span>
                                </h6>
                                <small class="text-muted" th:if="${g.concernedInstitute != null}">
                                    <i class="bi bi-building me-1"></i> Sent to: <span class="fw-semibold" th:text="${g.concernedInstitute.instituteName}">Institute Name</span>
                                </small>
                            </div>

                            <!-- Message Body -->
                            <div class="bg-light p-3 rounded border border-light">
                                <p class="mb-0 text-dark text-pre-wrap" style="font-size: 0.95rem;" th:text="${g.message}">
                                    Message body goes here...
                                </p>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

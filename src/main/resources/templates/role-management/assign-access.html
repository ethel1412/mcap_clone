<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Assign Role Access</title>
    <link rel="stylesheet" th:href="@{/css/role-management/assign-access.css}">
</head>
<body>
<main>
    <div class="container py-4">
        <h2 class="mb-4 fw-bold text-warning">
            <i class="fas fa-user-shield me-2"></i>Assign Role Access
        </h2>

        <div id="messageArea" class="mb-3"></div>

        <div class="card shadow-sm">
            <div class="card-header bg-light">
                <label for="roleSelect" class="form-label mb-0 fw-bold">1. Select a Role to Configure Access</label>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <select id="roleSelect" class="form-select form-select-lg">
                        <option value="" selected>-- Choose a role --</option>
                    </select>
                </div>

                <h5 class="card-title mt-4 fw-bold">2. Assign Menu Permissions</h5>
                <div id="menuTreeContainer" class="border p-3 rounded bg-light menu-tree-container">
                    <div class="d-flex justify-content-center align-items-center h-100 text-muted">
                        Select a role to load its menus...
                    </div>
                </div>
            </div>
            <div class="card-footer text-end">
                <button id="saveAccessBtn" class="btn btn-warning text-white fw-bold px-4" disabled>
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </div>
        </div>
    </div>
    <script type="module" th:src="@{/js/role-management/assign-access.js}"></script>
</main>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Notifications</title>
</head>
<body>
    <!-- Notification Bell Fragment -->
    <div th:fragment="notificationBell" class="dropdown">
        <a class="nav-link position-relative" href="#" id="notificationDropdown" 
           role="button" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="fa-solid fa-bell fa-lg"></i>
            <!-- Notification Badge -->
            <span id="notificationBadge" 
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  style="display: none;">
                0
            </span>
        </a>
        
        <!-- Dropdown Menu -->
        <div class="dropdown-menu dropdown-menu-end notification-dropdown" 
             aria-labelledby="notificationDropdown" style="width: 350px; max-height: 400px; overflow-y: auto;">
            <div class="dropdown-header d-flex justify-content-between align-items-center">
                <span class="fw-bold">Notifications</span>
                <button id="markAllReadBtn" class="btn btn-sm btn-link text-decoration-none p-0">
                    Mark all as read
                </button>
            </div>
            <div class="dropdown-divider"></div>
            
            <!-- Notification List Container -->
            <div id="notificationList">
                <div class="text-center text-muted py-3">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p class="mb-0 mt-2">Loading notifications...</p>
                </div>
            </div>
            
            <div class="dropdown-divider"></div>
            <a class="dropdown-item text-center text-primary fw-bold" th:href="@{/institute-notifications}">
                <small>View All Notifications</small>
            </a>
        </div>
    </div>
</body>
</html>

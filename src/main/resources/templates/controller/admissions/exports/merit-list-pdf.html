<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <style>
        body { font-family: 'Helvetica', sans-serif; margin: 20px; color: #333; }
        .header { text-align: center; border-bottom: 2px solid #0056b3; padding-bottom: 10px; margin-bottom: 20px; }
        .title { font-size: 22px; font-weight: bold; color: #0056b3; margin-bottom: 5px; }
        .sub-title { font-size: 12px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background-color: #f2f2f2; border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 12px; }
        td { border: 1px solid #ddd; padding: 8px; font-size: 11px; word-wrap: break-word; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .rank-col { width: 40px; }
        .score-col { width: 60px; font-weight: bold; }
    </style>
</head>
<body>
<div class="header">
    <div class="title" th:text="${meta.programmeName}">Programme Name</div>
    <div class="sub-title">
        Session: <span th:text="${meta.admissionWindowName}"></span> |
        Type: <span th:text="${meta.applicantType}"></span> |
        Generated On: <span th:text="${#temporals.format(meta.generatedOn, 'dd-MM-yyyy HH:mm')}"></span>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th class="rank-col text-center">Rank</th>
        <th>Application No</th>
        <th>Applicant Name</th>
        <th>Category</th>
        <th>Selection Logic</th>
        <th class="score-col text-right">Score</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="entry : ${entries}">
        <td class="text-center" th:text="${entry.rank}"></td>
        <td th:text="${entry.applicationNo}"></td>
        <td th:text="${entry.applicantName}"></td>
        <td th:text="${entry.category}"></td>
        <td th:text="${entry.selectionCriteria}"></td>
        <td class="text-right" th:text="${entry.meritScore}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}">

<head>
    <title>Manage Merit Lists</title>
</head>

<body>
<main>
    <div class="container-fluid px-4 py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h2 mb-0">
                <i class="fas fa-trophy me-2"></i>Generate & Manage Merit Lists
            </h1>
            <button type="button" class="btn btn-primary shadow-sm">
                <i class="fas fa-cogs me-2"></i>Generate New List
            </button>
        </div>

        <div class="card">
            <div class="card-body">
                <div class="alert alert-info" role="alert">
                    <h4 class="alert-heading">Under Construction</h4>
                    <p>
                        After the application deadline, administrators will use this module to generate merit lists based on predefined criteria (e.g., marks, categories).
                    </p>
                    <hr>
                    <p class="mb-0">
                        Functionality will include creating, publishing, and managing different rounds of selection lists.
                    </p>
                </div>
            </div>
        </div>
        
    </div>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}">

<head>
    <title>View Student Applicants</title>
</head>

<body>
<main>
    <div class="container-fluid px-4 py-4">

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">
                    <i class="fas fa-users me-2"></i>Student Applicants
                </h5>
            </div>
            
            <div class="card-body">
                
                <!-- Show table only if data exists -->
                <div th:if="${studentAllotments != null and !studentAllotments.isEmpty()}">
                    <div class="table-responsive">
                        <table id="applicantsTable" class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>#</th>
                                    <th>Application No.</th>
                                    <th>Student Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Programme</th>
                                    <th>Department</th>
                                    <th>Status</th>
                                    <th>Admission Window</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="student : ${studentAllotments}">
                                    <td></td>  
                                    <td th:text="${student.applicationNumber}"></td>
                                    <td th:text="${student.studentName}"></td>
                                    <td th:text="${student.studentEmail}"></td>
                                    <td th:text="${student.studentPhone}"></td>
                                    <td th:text="${student.programmeName}"></td>
                                    <td th:text="${student.departmentName}"></td>
                                    <td>
                                        <span th:class="${'badge ' + (student.allotmentStatus.name() == 'CONFIRMED' ? 'bg-success' : 
                                                         student.allotmentStatus.name() == 'PENDING' ? 'bg-warning' : 'bg-secondary')}"
                                              th:text="${student.allotmentStatus}">
                                        </span>
                                    </td>
                                    <td th:text="${student.admissionWindowName}"></td>
                                </tr>
                            </tbody>
                            
                        </table>
                    </div>
                </div>

                <!-- Show message if no data -->
                <div th:if="${studentAllotments == null or studentAllotments.isEmpty()}" 
                     class="alert alert-info" role="alert">
                    <h4 class="alert-heading">No Student Applicants Found</h4>
                    <p>
                        There are currently no students allotted to your institute. 
                        Students will appear here once seat allotments are processed by the administration.
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>

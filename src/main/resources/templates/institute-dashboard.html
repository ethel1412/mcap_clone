<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::body})}">
<head>
    <title>Institute Dashboard</title>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<div class="container-fluid p-4">
    <div id="loading-spinner" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Loading Dashboard...</p>
    </div>

    <div id="main-dashboard-content" class="d-none">
        <div class="dashboard-header d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="header-content d-flex align-items-center">
                <div class="header-icon me-3"><i class="fa-solid fa-building-columns"></i></div>
                <div class="header-text">
                    <h1 class="institute-name mb-1" id="ui-inst-name">...</h1>
                    <p class="institute-meta mb-0">
                        <span class="badge bg-success"><i class="fa-solid fa-circle-check me-1"></i> <span id="ui-inst-status">...</span></span>
                        <span class="ms-3 text-white-50"><i class="fa-solid fa-calendar me-1"></i> Est. <span id="ui-inst-year">...</span></span>
                        <span class="ms-3 text-white-50"><i class="fa-solid fa-id-card me-1"></i> AISHE: <span id="ui-inst-aishe">...</span></span>
                    </p>
                </div>
            </div>

            <div class="header-actions position-relative z-1050 pointer-events-auto">

                <button id="addLinkBtn" class="btn btn-light text-primary rounded-pill fw-bold shadow-sm px-4 py-2 d-none"
                        data-bs-toggle="modal" data-bs-target="#prospectusModal">
                    <i class="fa-solid fa-link me-2"></i>Add Prospectus Link
                </button>

                <div id="editLinkGroup" class="d-none">
                    <a id="viewLinkBtn" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-light text-primary rounded-pill fw-bold shadow-sm px-4 py-2 me-2">
                        <i class="fa-solid fa-arrow-up-right-from-square me-2"></i>View Prospectus
                    </a>
                    <button id="editLinkBtn" class="btn btn-outline-light rounded-pill px-4 py-2 fw-bold"
                            data-bs-toggle="modal" data-bs-target="#prospectusModal">
                        <i class="fa-solid fa-pen me-1"></i>Edit Link
                    </button>
                </div>

            </div>
        </div>

        <div class="stats-section mt-4">
            <div class="institute-stat-card purple-card">
                <div class="stat-content">
                    <div class="stat-value" id="stat-prog">0</div>
                    <div class="stat-label">Programmes Offered</div>
                </div>
            </div>
            <div class="stat-card blue-card">
                <div class="stat-content">
                    <div class="stat-value" id="stat-app">0</div>
                    <div class="stat-label">Total Applicants</div>
                </div>
            </div>
            <div class="stat-card green-card">
                <div class="stat-content">
                    <div class="stat-value" id="stat-adm">0</div>
                    <div class="stat-label">Admissions Accepted</div>
                </div>
            </div>
            <div class="stat-card orange-card">
                <div class="stat-content">
                    <div class="stat-value" id="stat-rate">0%</div>
                    <div class="stat-label">Acceptance Rate</div>
                </div>
            </div>
        </div>

        <div class="details-card mt-4">
            <div class="card-header-custom">
                <i class="fa-solid fa-circle-info me-2"></i>
                <span>Institute Information</span>
            </div>
            <div class="card-body-custom">
                <div class="details-grid">
                    <div class="detail-item">
                        <div class="detail-icon"><i class="fa-solid fa-user-tie"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">Institution Head</div>
                            <div class="detail-value" id="ui-inst-head">...</div>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon"><i class="fa-solid fa-envelope"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">Official Email</div>
                            <div class="detail-value"><a href="" id="ui-inst-email">...</a></div>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon"><i class="fa-solid fa-phone"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">Contact Number</div>
                            <div class="detail-value"><a href="" id="ui-inst-phone">...</a></div>
                        </div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-icon"><i class="fa-solid fa-globe"></i></div>
                        <div class="detail-content">
                            <div class="detail-label">Website</div>
                            <div class="detail-value"><a href="" target="_blank" id="ui-inst-web">...</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="prospectusModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow border-0">
            <div class="modal-body p-4">
                <form id="prospectusForm">
                    <label for="prospectusUrlInput" class="form-label fw-bold">Prospectus URL</label>
                    <input type="url" class="form-control" id="prospectusUrlInput" placeholder="https://...">
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" id="saveProspectusBtn" class="btn btn-primary rounded-pill px-4">Save Link</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/axios.min.js}"></script>
<script th:src="@{/js/institute/institute-dashboard.js}" defer></script>
</body>
</html>

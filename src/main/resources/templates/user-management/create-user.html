<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::title}, ~{::main})}">

<head>
  <title>Create New User</title>
</head>
<body>
<!-- Main content fragment -->
<th:block th:fragment="main">
<section class="container-fluid px-4 py-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Create New User</h5>
        </div>
        <div class="card-body">
          
          <div id="alert-box" class="mb-3"></div>

          <form th:object="${userDTO}"
      th:action="@{/user-management/data/create-user}"
      method="post"
      id="createUserForm"
      novalidate>

  <!-- CSRF Token -->
  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

  <!-- Username -->
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input th:field="*{username}" id="username" class="form-control" placeholder="Enter username" required/>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
  </div>

  <!-- Password -->
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input th:field="*{password}" id="password" type="password" class="form-control" placeholder="Enter password" required minlength="6"/>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
  </div>

   <!-- Confirm Password (not bound to DTO) -->
   <div class="mb-3">
    <label for="confirmPassword" class="form-label">Confirm Password</label>
    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Re-enter password" required minlength="6" />
    <div class="invalid-feedback">Passwords do not match.</div>
  </div>

  <!-- Role -->
  <div class="mb-3">
    <label for="roleName" class="form-label">Role</label>
    <select th:field="*{roleName}" id="roleName" class="form-select" required>
      <option value="">Select Role</option>
      <option th:each="role : ${roles}" th:value="${role.roleName}" th:text="${role.roleName}"></option>
    </select>
    <div class="invalid-feedback" th:if="${#fields.hasErrors('roleName')}" th:errors="*{roleName}"></div>
  </div>

  <!-- Organization Owner Type -->
  <div class="mb-3">
    <label for="orgOwnerType" class="form-label">Organization Owner Type</label>
    <select id="orgOwnerType" name="orgOwnerType" class="form-select" required>
      <option value="">Select an option</option>
      <option value="INSTITUTE">Institute</option>
      <option value="GOVT_DEPARTMENT">Government Department</option>
      <option value="INSTITUTE_DEPARTMENT">Institute Department</option>
    </select>
    <div class="invalid-feedback">Please select an organization owner type.</div>
  </div>

  <!-- Account Settings Checkboxes -->
  <div class="border rounded p-3 mb-3 bg-light">
    <h6 class="fw-semibold mb-3">Account Settings</h6>

    <div class="form-check mb-2">
      <input type="checkbox" id="isSuperuser" name="isSuperuser" class="form-check-input"/>
      <label class="form-check-label" for="isSuperuser">Superuser</label>
    </div>

    <div class="form-check mb-2">
      <input type="checkbox" id="enabled" name="enabled" class="form-check-input" checked/>
      <label class="form-check-label" for="enabled">Enabled</label>
    </div>

    <div class="form-check mb-2">
      <input type="checkbox" id="accountNonExpired" name="accountNonExpired" class="form-check-input" checked/>
      <label class="form-check-label" for="accountNonExpired">Account Non-Expired</label>
    </div>

    <div class="form-check mb-2">
      <input type="checkbox" id="accountNonLocked" name="accountNonLocked" class="form-check-input" checked/>
      <label class="form-check-label" for="accountNonLocked">Account Non-Locked</label>
    </div>

    <div class="form-check">
      <input type="checkbox" id="credentialsNonExpired" name="credentialsNonExpired" class="form-check-input" checked/>
      <label class="form-check-label" for="credentialsNonExpired">Credentials Non-Expired</label>
    </div>
  </div>

  <!-- Submission Buttons -->
  <div class="d-flex justify-content-end">
    <button type="reset" class="btn btn-outline-secondary me-2">Clear</button>
    <button type="submit" id="createBtn" class="btn btn-primary">Create User</button>
  </div>
</form>

        </div>
      </div>
    </div>
  </div>

  <!-- Page-specific scripts -->
  <script th:src="@{/js/axios.min.js}" defer></script>
  <script th:src="@{/js/common-data.js}" defer></script>
  <script th:src="@{/js/user-management/create-user.js}" defer></script>
</section>
</th:block>
</body>
</html>
